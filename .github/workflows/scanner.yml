name: Elite Scanner — Full Pipeline

on:
  workflow_dispatch:
  schedule:
    # New York market hours during daylight saving time:
    # 9:30 AM ET to 9:59 AM ET
    - cron: "30-59/10 13 * * 1-5"

    # 10:00 AM ET to 3:59 PM ET
    - cron: "*/10 14-19 * * 1-5"

permissions:
  contents: write

concurrency:
  group: elite-scanner-full-pipeline
  cancel-in-progress: true

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    env:
      PYTHONPATH: .
      TZ: America/New_York

      # ── Alpaca paper trading (existing) ───────────────────────────────
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      AUTO_PAPER_TRADE: ${{ secrets.AUTO_PAPER_TRADE }}

      # ── Telegram alerts (existing) ────────────────────────────────────
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ── Phase 3/4 — Free LLM (pick ONE, both are free to sign up) ────
      # Option A: Google Gemini 1.5 Flash
      #   Free tier: 1,500 req/day, 15 RPM, 1M tokens/min
      #   Get key:  https://aistudio.google.com/app/apikey  (free, no card)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Option B: Groq (llama3-8b-8192)
      #   Free tier: generous rate limits, no daily cap
      #   Get key:  https://console.groq.com/  (free, no card)
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # If NEITHER key is set the panel uses a rule-based fallback — still works.

      # ── Repo variables with safe defaults ─────────────────────────────
      MAX_NOTIONAL_PER_TRADE: ${{ vars.MAX_NOTIONAL_PER_TRADE || '2000' }}
      MAX_NEW_ORDERS_PER_RUN: ${{ vars.MAX_NEW_ORDERS_PER_RUN || '1' }}
      WIDE_SCAN_LIMIT: ${{ vars.WIDE_SCAN_LIMIT || '150' }}
      DEEP_SCAN_LIMIT: ${{ vars.DEEP_SCAN_LIMIT || '40' }}
      MAX_DATA_CALLS_PER_RUN: ${{ vars.MAX_DATA_CALLS_PER_RUN || '90' }}
      MAX_BUY_ALERTS_PER_RUN: ${{ vars.MAX_BUY_ALERTS_PER_RUN || '5' }}
      MAX_WAIT_ALERTS_PER_RUN: ${{ vars.MAX_WAIT_ALERTS_PER_RUN || '3' }}
      MIN_ENTRY_SCORE_FOR_ORDER: ${{ vars.MIN_ENTRY_SCORE_FOR_ORDER || '80' }}
      # Phase 4 — LightGBM breakout threshold (0.65 default; lower = more signals)
      LGBM_BREAKOUT_THRESHOLD: ${{ vars.LGBM_BREAKOUT_THRESHOLD || '0.65' }}
      # Multi-agent panel: 'true' to enable (uses free Gemini/Groq, or rule-based)
      ENABLE_PANEL_REVIEW: ${{ vars.ENABLE_PANEL_REVIEW || 'false' }}
      # Phase 5 — walk-forward backtesting
      WF_N_FOLDS: ${{ vars.WF_N_FOLDS || '5' }}
      WF_EMBARGO_BARS: ${{ vars.WF_EMBARGO_BARS || '5' }}
      # Phase 1 — SimClusters velocity threshold
      SIMCLUSTER_MIN_VELOCITY_DELTA: ${{ vars.SIMCLUSTER_MIN_VELOCITY_DELTA || '2.0' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package requirements
        run: |
          python -m pip install --upgrade pip
          # Core deps always installed; heavy ML (torch, transformers) are optional.
          # If torch wheel is unavailable for this runner, fall back to CPU-only.
          pip install -r requirements.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            || pip install pandas numpy yfinance requests pytz pytest PyYAML \
                         alpaca-py websockets lightgbm scipy \
                         transformers sentence-transformers

      - name: Run unit tests
        run: |
          pytest -q

      - name: Clean Python cache artifacts before repo audit
        run: |
          find . -type d \( -name "__pycache__" -o -name ".pytest_cache" \) -prune -exec rm -rf {} +
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

      - name: Audit repo structure
        run: |
          python scripts/audit_repo.py

      - name: Run scanner
        run: |
          python scripts/run_scanner.py

      - name: Validate dashboard
        run: |
          python scripts/build_dashboard.py --validate-only

      - name: Clean Python cache artifacts before release validation
        run: |
          find . -type d \( -name "__pycache__" -o -name ".pytest_cache" \) -prune -exec rm -rf {} +
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

      - name: Validate release
        run: |
          python scripts/validate_release.py

      - name: Commit dashboard and state updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/data/*.json state/*.json || true

          if git diff --cached --quiet; then
            echo "No dashboard or state changes to commit."
          else
            git commit -m "Update scanner dashboard data"
            git push
          fi
