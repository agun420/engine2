name: Elite Scanner — Full Pipeline

on:
  workflow_dispatch:
  schedule:
    # New York market hours during daylight saving time:
    # 9:30 AM ET to 9:59 AM ET
    - cron: "30-59/10 13 * * 1-5"

    # 10:00 AM ET to 3:59 PM ET
    - cron: "*/10 14-19 * * 1-5"

permissions:
  contents: write

concurrency:
  group: elite-scanner-100
  cancel-in-progress: true

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      PYTHONPATH: .
      TZ: America/New_York

      # Alpaca paper trading secrets
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      AUTO_PAPER_TRADE: ${{ secrets.AUTO_PAPER_TRADE }}

      # Telegram secrets
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Phase 1 — data ingestion secrets
      S3_PARTNERS_API_KEY: ${{ secrets.S3_PARTNERS_API_KEY }}
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
      LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}

      # Phase 3/4 — AI agents
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Repo variables with safe defaults
      MAX_NOTIONAL_PER_TRADE: ${{ vars.MAX_NOTIONAL_PER_TRADE || '2000' }}
      MAX_NEW_ORDERS_PER_RUN: ${{ vars.MAX_NEW_ORDERS_PER_RUN || '1' }}
      WIDE_SCAN_LIMIT: ${{ vars.WIDE_SCAN_LIMIT || '150' }}
      DEEP_SCAN_LIMIT: ${{ vars.DEEP_SCAN_LIMIT || '40' }}
      MAX_DATA_CALLS_PER_RUN: ${{ vars.MAX_DATA_CALLS_PER_RUN || '90' }}
      MAX_BUY_ALERTS_PER_RUN: ${{ vars.MAX_BUY_ALERTS_PER_RUN || '5' }}
      MAX_WAIT_ALERTS_PER_RUN: ${{ vars.MAX_WAIT_ALERTS_PER_RUN || '3' }}
      MIN_ENTRY_SCORE_FOR_ORDER: ${{ vars.MIN_ENTRY_SCORE_FOR_ORDER || '80' }}
      # Phase 4 — LightGBM threshold (lower = more signals)
      LGBM_BREAKOUT_THRESHOLD: ${{ vars.LGBM_BREAKOUT_THRESHOLD || '0.65' }}
      # Set to 'true' to enable multi-agent panel review (costs Anthropic credits)
      ENABLE_PANEL_REVIEW: ${{ vars.ENABLE_PANEL_REVIEW || 'false' }}
      # Phase 5 — walk-forward folds
      WF_N_FOLDS: ${{ vars.WF_N_FOLDS || '5' }}
      WF_EMBARGO_BARS: ${{ vars.WF_EMBARGO_BARS || '5' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            # Heavy ML deps (torch, transformers) are optional; failures are non-fatal
            pip install -r requirements.txt || pip install -r requirements.txt \
              --ignore-requires-python \
              --extra-index-url https://download.pytorch.org/whl/cpu 2>&1 | tail -20
          fi

      - name: Run unit tests
        run: |
          pytest -q

      - name: Clean Python cache artifacts before repo audit
        run: |
          find . -type d \( -name "__pycache__" -o -name ".pytest_cache" \) -prune -exec rm -rf {} +
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

      - name: Audit repo structure
        run: |
          python scripts/audit_repo.py

      - name: Run scanner
        run: |
          python scripts/run_scanner.py

      - name: Validate dashboard
        run: |
          python scripts/build_dashboard.py --validate-only

      - name: Clean Python cache artifacts before release validation
        run: |
          find . -type d \( -name "__pycache__" -o -name ".pytest_cache" \) -prune -exec rm -rf {} +
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

      - name: Validate release
        run: |
          python scripts/validate_release.py

      - name: Commit dashboard and state updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/data/*.json state/*.json || true

          if git diff --cached --quiet; then
            echo "No dashboard or state changes to commit."
          else
            git commit -m "Update scanner dashboard data"
            git push
          fi
